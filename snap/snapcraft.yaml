name: sarala
# `base: core22` == Ubuntu 22.04, which is where the GitHub release build runs and
# the only Ubuntu series that still ships libwebkit2gtk-4.1 that Tauri v2 needs.
base: core22
# The `gnome` extension's build snap (gnome-42-2204-sdk) is only published for
# amd64 and arm64. Restrict builds to those, or the Snap Store's build service —
# which otherwise attempts every architecture — fails on ppc64el / s390x where
# that SDK doesn't exist. These two cover x86-64 and 64-bit ARM Linux desktops.
architectures:
  - build-on: [amd64]
  - build-on: [arm64]
adopt-info: sarala # version + summary are pulled from package.json at build time
title: Sarala
summary: A seamless WYSIWYG Markdown editor
license: GPL-3.0-or-later
website: https://github.com/solancer/sarala
source-code: https://github.com/solancer/sarala
issues: https://github.com/solancer/sarala/issues
contact: https://github.com/solancer/sarala/issues
description: |
  Sarala is a fast, distraction-free WYSIWYG Markdown editor. It styles Markdown
  live as you type while keeping the underlying source intact, and renders code,
  math (KaTeX), Mermaid, and D2 diagrams. Files are read and written as plain
  Markdown, so your documents are never locked into a proprietary format.

grade: stable
confinement: strict

# webkit2gtk dlopen()s some of its own modules by absolute path; bind the staged
# copy back over the expected location so it resolves inside the confined snap.
layout:
  /usr/lib/$SNAPCRAFT_ARCH_TRIPLET/webkit2gtk-4.1:
    bind: $SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/webkit2gtk-4.1

apps:
  sarala:
    command: usr/bin/sarala
    desktop: usr/share/applications/sarala.desktop
    # The `gnome` extension wires up the GTK/GNOME runtime, themes, fonts, and the
    # graphics (wayland/x11/opengl) plugs, so we only declare the extra ones.
    extensions: [gnome]
    plugs:
      - home # open/save Markdown files in the user's home via the native dialog
      - removable-media # ...and on mounted USB drives / external disks
      - network # auto-updater check + remote images in previews

parts:
  sarala:
    plugin: dump
    source: .
    build-snaps:
      - node/20/stable
      - rustup/latest/stable
    build-packages:
      - libwebkit2gtk-4.1-dev
      - build-essential
      - curl
      - wget
      - file
      - libxdo-dev
      - libssl-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      # rfd's xdg-portal backend pulls wayland-backend with the client_system
      # feature, which links libwayland-client at build time (see src-tauri/Cargo.toml).
      - libwayland-dev
      - dpkg
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libayatana-appindicator3-1
    # Graphics are provided by the `gnome` extension's platform snap (Mesa via the
    # opengl/content interfaces), so drop the GPU userspace stack that webkit2gtk's
    # stage-packages drag in. Bundling it bloats the snap and trips the store's "GPU
    # support library should be provided by a content interface" review. Note: this
    # deliberately does NOT prune the libsoup/gstreamer "unused library" warnings —
    # webkit2gtk dlopen()s those at runtime, so the linter can't see they're needed.
    prime:
      - -usr/lib/*/dri
      - -usr/lib/*/libEGL_mesa.so*
      - -usr/lib/*/libGLX_mesa.so*
      - -usr/lib/*/libGLESv2.so*
      - -usr/lib/*/libGL.so*
      - -usr/lib/*/libGLX.so*
      - -usr/lib/*/libgbm.so*
      - -usr/lib/*/libglapi.so*
      - -usr/lib/*/libdrm_*.so*
    override-build: |
      set -eu

      # Keep the snap version in lockstep with package.json (bumped by `pnpm release`).
      craftctl set version="$(node -p "require('$CRAFT_PART_SRC/package.json').version")"

      rustup default stable
      npm install -g pnpm@9
      pnpm install --frozen-lockfile

      # Build the .deb only — it's the cleanest way to get the binary + .desktop +
      # icons laid out the way snapcraft wants, which we then unpack into the snap.
      # Disable updater artifacts: the Snap Store handles updates, so we neither
      # produce nor sign them here (and thus need no TAURI_SIGNING_PRIVATE_KEY).
      pnpm tauri build --bundles deb --config '{"bundle":{"createUpdaterArtifacts":false}}'

      # Unpack the .deb into a scratch dir first. `$CRAFT_PART_INSTALL` already holds
      # the stage-packages (webkit, appindicator, and their deps), which ship their
      # own binaries and .desktop files under usr/ — extracting there makes "find the
      # app's files" ambiguous. In the scratch dir the deb's payload stands alone.
      pkgroot="$(mktemp -d)"
      dpkg-deb -x src-tauri/target/release/bundle/deb/*.deb "$pkgroot"

      # The binary keeps the Cargo package name (`sarala`), which `apps.command`
      # hard-codes. Fail loudly here if Tauri ever changes that, rather than shipping
      # a snap whose command doesn't resolve.
      test -x "$pkgroot/usr/bin/sarala"

      # Tauri names the .desktop after productName (`Sarala.desktop`); rename it to
      # match `apps.desktop`, and point Icon at the staged 128px icon. snapd rewrites
      # an absolute Icon path to resolve inside the snap's mount.
      mv "$pkgroot"/usr/share/applications/*.desktop "$pkgroot/usr/share/applications/sarala.desktop"
      sed -i -E 's|^Icon=.*|Icon=/usr/share/icons/hicolor/128x128/apps/sarala.png|' \
        "$pkgroot/usr/share/applications/sarala.desktop"

      # Merge the app payload into the snap alongside the stage-packages.
      cp -rT "$pkgroot/usr" "$CRAFT_PART_INSTALL/usr"
